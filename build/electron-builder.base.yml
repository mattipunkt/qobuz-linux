appId: dev.mukkematti.qobuz-linux
electronVersion: 31.7.7
electronDownload:
  version: 31.7.7
  mirror: https://github.com/electron/electron/releases/download/v
files:
  - "**/*"
  - "!.flatpak-builder${/*}"
  - "!_build${/*}"
  - "!repo${/*}"
  - "!flatpak${/*}"
snap:
  plugs:
    - default
    - screen-inhibit-control
linux:
  category: AudioVideo
  icon: build/icons
  maintainer: Matti Weidlich <mattipunkt@users.noreply.github.com>
  target:
    - dir
  executableName: qobuz-linux
  desktop:
    entry: build/qobuz-linux.desktop

mac:
  category: public.app-category.entertainment
win:
  icon: icon.png
  artifactName: "qobuzlinux"
  appId: dev.mukkematti.qobuz-linux
  executableName: qobuzlinux
protocols:
  name: "qobuz"
  role: "Viewer"
  schemes: ["qobuz"]